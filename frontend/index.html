<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PakEconBot</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <span class="flag" aria-hidden="true">🇵🇰</span>
          <div>
            <h1>PakEconBot</h1>
            <p class="tagline">Pakistan economy · agentic RAG</p>
          </div>
        </div>
        <div class="header-actions">
          <button type="button" id="btn-clear" class="btn secondary">Clear thread</button>
        </div>
      </header>

      <main class="chat" id="chat" aria-live="polite"></main>

      <form class="composer" id="form" autocomplete="off">
        <label class="sr-only" for="input">Your question</label>
        <textarea
          id="input"
          rows="2"
          placeholder="Ask about GDP, trade, inflation, sectors…"
          required
        ></textarea>
        <button type="submit" class="btn primary" id="btn-send">Send</button>
      </form>
      <p class="hint">Answers use your knowledge base (Pinecone) and Groq. Set API keys in the environment.</p>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
